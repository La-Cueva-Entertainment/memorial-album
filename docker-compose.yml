services:
  lovecali:
    image: ghcr.io/la-cueva-entertainment/memorial-album:latest
    # To build locally instead of pulling:
    # build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data          # database + user uploads
    environment:
      DATABASE_URL: file:./data/dev.db
      SESSION_SECRET: "change-me-to-a-random-32-char-string"
      CONTACT_EMAIL: ""
      BACKUP_SECRET: "change-me-to-a-random-secret"
      DEFAULT_ALBUM_LINK: ""
      NEXT_PUBLIC_DEFAULT_ALBUM_LINK: ""
      IMMICH_SERVER_URL: ""
      IMMICH_API_KEY: ""
      IMMICH_ALBUM_ID: ""
      NEXT_PUBLIC_IMMICH_SERVER_URL: ""
      NEXT_PUBLIC_IMMICH_ALBUM_ID: ""
      NEXT_PUBLIC_BASE_URL: "https://welovecali.lacueva.us"  # canonical domain — used for og:image URL in link previews
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_ADMIN_EMAILS: ""     # comma-separated admin emails
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "1"
      NEXT_PUBLIC_SITE_NAME: ""   # e.g. Kathryn Cali Lee
      NEXT_PUBLIC_SITE_ACCENT: "#b5704f"
      MAX_UPLOAD_MB: "2000"
      ALBUM_QUOTA_MB: "5000"
      GLOBAL_QUOTA_GB: "250"
      MAX_ALBUMS: "50"
    restart: unless-stopped
